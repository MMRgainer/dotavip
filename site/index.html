<html lang="uk">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Оверлей для Dota 2: таймери байбеку, ультів і Рошана прямо в грі. Безкоштовно.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #38bdf8;
      --bg: #060b14;
      --card: #0d1829;
      --border: #1e2d45;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: rgba(6,11,20,.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(30,45,69,.6);
    }

    .nav-logo {
      font-size: 1.1rem;
      font-weight: 900;
      letter-spacing: -.01em;
      color: var(--text);
    }
    .nav-logo span { color: var(--accent); }

    .lang-switcher {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .15s;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--border); }
    .lang-btn.active {
      color: var(--accent);
      border-color: rgba(56,189,248,.35);
      background: rgba(56,189,248,.08);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 60px;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(56,189,248,.10) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(129,140,248,.07) 0%, transparent 60%);
    }

    .badge {
      display: inline-block;
      background: rgba(56,189,248,.12);
      border: 1px solid rgba(56,189,248,.25);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 22px;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted);
      max-width: 560px;
      line-height: 1.7;
      margin-bottom: 44px;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #020917;
      font-size: 1.05rem;
      font-weight: 800;
      padding: 16px 38px;
      border-radius: 12px;
      text-decoration: none;
      transition: transform .15s, box-shadow .15s, background .15s;
      box-shadow: 0 0 32px rgba(56,189,248,.30);
    }
    .btn-primary:hover {
      background: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 0 48px rgba(56,189,248,.45);
    }

    .dl-meta {
      margin-top: 14px;
      font-size: 12.5px;
      color: var(--muted);
    }

    /* ── FEATURES ── */
    .features {
      max-width: 1000px;
      margin: 0 auto;
      padding: 80px 24px;
    }

    .section-label {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    h2 {
      text-align: center;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 800;
      margin-bottom: 56px;
      letter-spacing: -.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 26px;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: rgba(56,189,248,.35); transform: translateY(-3px); }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-icon img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      border-radius: 4px;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text);
    }

    .card p {
      font-size: 13.5px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── HOW IT WORKS ── */
    .how {
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 80px 24px;
    }

    .steps {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .step {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .step-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(56,189,248,.12);
      border: 1.5px solid rgba(56,189,248,.35);
      color: var(--accent);
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .step-text h4 { font-size: .95rem; font-weight: 700; margin-bottom: 4px; }
    .step-text p  { font-size: 13.5px; color: var(--muted); line-height: 1.6; }

    /* ── CTA BOTTOM ── */
    .cta {
      text-align: center;
      padding: 90px 24px;
    }
    .cta h2 { margin-bottom: 18px; }
    .cta p  { color: var(--muted); font-size: 1rem; margin-bottom: 36px; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px;
      text-align: center;
      font-size: 12.5px;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: underline; }

    /* ── Download / install-help modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(2,6,23,.78); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      max-width: 460px; width: 100%;
      background: #111827; border: 1px solid var(--border); border-radius: 16px;
      padding: 26px 26px 22px; box-shadow: 0 24px 80px rgba(0,0,0,.6);
    }
    .modal-card h3 { margin: 0 0 14px; font-size: 20px; color: #e2e8f0; }
    .modal-card p { margin: 0 0 12px; font-size: 14px; line-height: 1.6; color: var(--muted); }
    .modal-card .modal-step {
      background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.3);
      border-radius: 10px; padding: 12px 14px; color: #e2e8f0; font-weight: 600;
    }
    .modal-card .modal-verify {
      display: inline-block; margin: 4px 0 18px; color: #38bdf8;
      text-decoration: none; font-size: 13.5px; font-weight: 600;
    }
    .modal-card .modal-verify:hover { text-decoration: underline; }
    .modal-card .modal-close {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      background: var(--accent, #2563eb); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }
  </style>

        f6_title: 'Zero distraction',
        f6_desc:  'Transparent overlay that never steals focus from the game. Hides automatically when Dota is not active. No FPS drop — and every button can be dragged to fit your layout.',

        how_label: 'Getting started',
        how_title: 'Three steps to start',
        s1_title:  'Download and install',
        s1_desc:   'Everything installs in one click in a few minutes.',
        s2_title:  'Set up the scoreboard',
        s2_desc:   'Run a quick calibration in the main app window. A clear guide walks you through it — takes about 1 minute.',

        s3_desc:   'Launch Dota 2 — the overlay appears automatically. Click the buttons under enemies to start timers right in the middle of the game.',

        cta_title:   'Ready to try?',
        cta_desc:    'Free. No sign-up. Installs in a minute.',
        footer_note: 'Not affiliated with Valve or Dota 2',
        modal_title: 'Download started ✓',
        modal_lead:  'During install, Windows may show a blue “Windows protected your PC” dialog. That is normal for new apps without an expensive certificate — it does not mean the app is unsafe.',
        modal_step:  'To install: click “More info” → “Run anyway”.',
        modal_safe:  'DotaVIP does not modify the game, is not a cheat and collects none of your data. The full source is open — anyone can review it on GitHub.',
        modal_verify:'🔍 View the code on GitHub',
        modal_close: 'Got it',
      },
    };

    let currentLang = localStorage.getItem('lang') || 'ua';

    function setLang(l) {
      currentLang = l;
      localStorage.setItem('lang', l);
      render();
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.textContent.toLowerCase() === l);
      });
    }

    function render() {
      const d = T[currentLang];
      document.querySelectorAll('[data-t]').forEach(el => {
        const key = el.dataset.t;
        if (d[key] !== undefined) el.innerHTML = d[key];
      });
      document.documentElement.lang = currentLang === 'ua' ? 'uk' : currentLang;
    }

    // Fetch latest .exe URL from GitHub API and update both buttons.
    // Buttons already have a working fallback href (v1.0.1) so clicks work
    // instantly — the API call only upgrades them to a newer version if one exists.
    async function updateDownloadLink() {
      try {
        const res = await fetch('https://api.github.com/repos/DanyloIT/dotavip/releases/latest');
        const data = await res.json();
        const asset = data.assets?.find(a => a.name.endsWith('.exe') && !a.name.includes('blockmap'));
        if (asset?.browser_download_url) {
          document.getElementById('dl-btn').href  = asset.browser_download_url;
          document.getElementById('dl-btn2').href = asset.browser_download_url;
        }
      } catch {}
    }

    // Show the install-help modal after a download click (download still
    // proceeds via the anchor href; we don't preventDefault).
    const dlModal = document.getElementById('dl-modal');
    function openDlModal() { dlModal.classList.add('show'); }
    function closeDlModal() { dlModal.classList.remove('show'); }
    ['dl-btn', 'dl-btn2'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', () => setTimeout(openDlModal, 400));
    });
    document.getElementById('dl-modal-close').addEventListener('click', closeDlModal);
    dlModal.addEventListener('click', e => { if (e.target === dlModal) closeDlModal(); });

    render();
    updateDownloadLink();
    // Apply active state on load
    document.querySelectorAll('.lang-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase() === currentLang);
    });
  </script>
</body>
</html>
