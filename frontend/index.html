<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dota Overlay</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      /* Disable text selection across the overlay (prevents accidental
         highlighting on fast clicks). Inputs keep normal selection. */
      * { user-select: none; -webkit-user-select: none; }
      input, textarea { user-select: text; -webkit-user-select: text; }
      html, body, #root {
        background: transparent !important;
        margin: 0; padding: 0;
        overflow: hidden;
        border: none !important;
        outline: none !important;
      }
      /* Hide Vite dev overlay */
      vite-error-overlay { display: none !important; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
      .blink { animation: blink .7s infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
